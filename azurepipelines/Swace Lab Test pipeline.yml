name: Swace Lab Test pipeline
trigger: none
parameters:
  - name: environment
    displayName: 'Select Test Environment'
    type: string
    default: 'UAT'
    values: 
      - 'DEV'
      - 'UAT'
      - 'QA'
      - 'STG'
      - 'PROD'
  - name: Scope
    displayName: 'Test Scope'
    type: string
    default: 'sanity'
    values:
      - 'sanity'
      - 'smoke'
      - 'regression'
      - 'Patching'
      - 'E2E'

pool:
  vmImage: 'ubuntu-latest'

jobs:
  - job: PlaywrightTests
    displayName: 'Run Playwright Tests'
    condition: |
      not(
        or(
          and(
            eq('${{ parameters.Scope }}', 'E2E'),
            in('${{ parameters.environment }}', 'DEV', 'QA')
          ),
          and(
            eq('${{ parameters.Scope }}', 'regression'),
            eq('${{ parameters.environment }}', 'PROD')
          )
        )
      )
    steps:
      - checkout: self

      - task: NodeTool@0
        inputs:
          versionSpec: '22'
        displayName: 'Setup Node.js'

      - script: npm ci
        displayName: 'Install dependencies'

      - script: npx playwright install --with-deps chromium
        displayName: 'Install Playwright browsers'

      - script: npx bddgen
        displayName: 'Generate BDD tests'

      - script: npx playwright test
        displayName: 'Run Playwright tests'

      - task: PublishTestResults@2
        displayName: 'Publish test results'
        condition: always()
        inputs:
          testResultsFormat: 'JUnit'
          testResultsFiles: '$(System.DefaultWorkingDirectory)/test-results/junit.xml'
          testRunTitle: '$(Parameters.environment) - $(Parameters.Scope)'
          mergeTestResults: true
          failTaskOnFailedTests: true


