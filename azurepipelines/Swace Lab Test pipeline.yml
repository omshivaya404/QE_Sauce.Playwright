name: Swace Lab Test pipeline
trigger: none
parameters:
  - name: environment
    displayName: 'Select Test Environment'
    type: string
    default: 'UAT'
    values: 
      - 'DEV'
      - 'UAT'
      - 'QA'
      - 'STG'
      - 'PROD'
  - name: Scope
    displayName: 'Test Scope'
    type: string
    default: 'sanity'
    values:
      - 'sanity'
      - 'smoke'
      - 'regression'
      - 'Patching'
      - 'E2E'

variables:
  - group: playwright-secrets   # ADO Library > Variable Groups: WINDOWS_AUTH_USERNAME, WINDOWS_AUTH_PASSWORD

pool:
  vmImage: 'ubuntu-latest'

jobs:
  - job: ValidateParameters
    displayName: 'Validate Parameters'
    steps:
      - script: |
          echo "##[error]E2E scope is not supported for DEV or QA environments."
          exit 1
        displayName: 'Block E2E on DEV/QA'
        condition: |
          and(
            eq('${{ parameters.Scope }}', 'E2E'),
            in('${{ parameters.environment }}', 'DEV', 'QA')
          )

      - script: |
          echo "##[error]Regression scope is not supported for PROD environment."
          exit 1
        displayName: 'Block regression on PROD'
        condition: |
          and(
            eq('${{ parameters.Scope }}', 'regression'),
            eq('${{ parameters.environment }}', 'PROD')
          )

  - job: PlaywrightTests
    displayName: 'Playwright Tests'
    dependsOn: ValidateParameters
    condition: |
      not(
        or(
          and(
            eq('${{ parameters.Scope }}', 'E2E'),
            in('${{ parameters.environment }}', 'DEV', 'QA')
          ),
          and(
            eq('${{ parameters.Scope }}', 'regression'),
            eq('${{ parameters.environment }}', 'PROD')
          )
        )
      )
    steps:
      - checkout: self

      - task: NodeTool@0
        inputs:
          versionSpec: '22'
        displayName: 'Setup Node.js'

      - script: npm ci
        displayName: 'Install dependencies'

      - script: npx playwright install --with-deps chromium
        displayName: 'Install Playwright browsers'

      - script: npx bddgen
        displayName: 'Generate BDD tests'

      # 👇 only runs when scope is regression to clean stale blob files
      - script: rm -rf blob-report
        displayName: 'Clean blob report folder'
        condition: eq('${{ parameters.Scope }}', 'regression')

      - ${{ if eq(parameters.Scope, 'regression') }}:
        - template: templates/run-test-step.yml
          parameters:
            displayName: 'Run smoke test'
            script: 'npm run test:smoke'
            condition: succeeded()
            environment: '${{ parameters.environment }}'

        - template: templates/run-test-step.yml
          parameters:
            displayName: 'Run sanity test'
            script: 'npm run test:sanity-only'
            condition: succeeded()
            environment: '${{ parameters.environment }}'

        - template: templates/run-test-step.yml
          parameters:
            displayName: 'Run Regression Test'
            script: 'npx playwright test "Requests" "Account Services Manager" --workers=8 --fully-parallel'
            condition: succeeded()
            environment: '${{ parameters.environment }}'

      - ${{ if ne(parameters.Scope, 'regression') }}:
        - template: templates/run-test-step.yml
          parameters:
            displayName: 'Execute Tests (${{ parameters.environment }} - ${{ parameters.Scope }})'
            script: 'npm run test:${{ parameters.Scope }}'
            condition: succeeded()
            environment: '${{ parameters.environment }}'

      - task: PublishTestResults@2
        displayName: 'Publish test results'
        condition: always()
        inputs:
          testResultsFormat: 'JUnit'
          testResultsFiles: 'test-results/junit.xml'
          searchFolder: '$(System.DefaultWorkingDirectory)'
          mergeTestResults: true
          failTaskOnFailedTests: true

      - task: PublishPipelineArtifact@1
        displayName: 'Publish Playwright HTML report'
        condition: always()
        inputs:
          targetPath: '$(System.DefaultWorkingDirectory)/playwright-report'
          artifact: 'playwright-report'
          publishLocation: 'pipeline'