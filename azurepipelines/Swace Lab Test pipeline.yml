name: Swace Lab Test pipeline
trigger: none
parameters:
  - name: environment
    displayName: 'Select Test Environment'
    type: string
    default: 'UAT'
    values: 
      - 'DEV'
      - 'UAT'
      - 'QA'
      - 'STG'
      - 'PROD'
  - name: Scope
    displayName: 'Test Scope'
    type: string
    default: 'sanity'
    values:
      - 'sanity'
      - 'smoke'
      - 'regression'
      - 'Patching'
      - 'E2E'

variables:
  - group: playwright-secrets   # ADO Library > Variable Groups: WINDOWS_AUTH_USERNAME, WINDOWS_AUTH_PASSWORD

pool:
  vmImage: 'ubuntu-latest'

jobs:
  - job: ValidateParameters
    displayName: 'Validate Parameters'
    steps:
      - script: |
          echo "##[error]E2E scope is not supported for DEV or QA environments."
          exit 1
        displayName: 'Block E2E on DEV/QA'
        condition: |
          and(
            eq('${{ parameters.Scope }}', 'E2E'),
            in('${{ parameters.environment }}', 'DEV', 'QA')
          )

      - script: |
          echo "##[error]Regression scope is not supported for PROD environment."
          exit 1
        displayName: 'Block regression on PROD'
        condition: |
          and(
            eq('${{ parameters.Scope }}', 'regression'),
            eq('${{ parameters.environment }}', 'PROD')
          )

  - job: PlaywrightTests
    displayName: 'Execute Tests (${{ parameters.environment }} - ${{ parameters.Scope }})'
    dependsOn: ValidateParameters
    condition: |
      not(
        or(
          and(
            eq('${{ parameters.Scope }}', 'E2E'),
            in('${{ parameters.environment }}', 'DEV', 'QA')
          ),
          and(
            eq('${{ parameters.Scope }}', 'regression'),
            eq('${{ parameters.environment }}', 'PROD')
          )
        )
      )
    steps:
      - checkout: self

      - task: NodeTool@0
        inputs:
          versionSpec: '22'
        displayName: 'Setup Node.js'

      - script: npm ci
        displayName: 'Install dependencies'

      - script: npx playwright install --with-deps chromium
        displayName: 'Install Playwright browsers'

      - script: npx bddgen
        displayName: 'Generate BDD tests'

      # 👇 only runs when scope is regression to clean stale blob files
      - script: rm -rf blob-report
        displayName: 'Clean blob report folder'
        condition: eq('${{ parameters.Scope }}', 'regression')

      - script: npm run test:${{ parameters.Scope }}
        displayName: 'Execute Tests (${{ parameters.environment }} - ${{ parameters.Scope }})'
        env:
          TEST_ENV: '${{ parameters.environment }}'
          WINDOWS_AUTH_USERNAME: $(WINDOWS_AUTH_USERNAME)
          WINDOWS_AUTH_PASSWORD: $(WINDOWS_AUTH_PASSWORD)

      - script: |
          echo "##vso[task.logissue type=error]${{ parameters.Scope }} tests failed in ${{ parameters.environment }}."
          echo "##vso[task.logissue type=warning]Check Publish test results and the playwright-report artifact for details."
        displayName: 'Report failed test scope'
        condition: failed()

      - task: PublishTestResults@2
        displayName: 'Publish test results'
        condition: always()
        inputs:
          testResultsFormat: 'JUnit'
          testResultsFiles: 'test-results/junit.xml'
          searchFolder: '$(System.DefaultWorkingDirectory)'
          mergeTestResults: true
          failTaskOnFailedTests: true

      - task: PublishPipelineArtifact@1
        displayName: 'Publish Playwright HTML report'
        condition: always()
        inputs:
          targetPath: '$(System.DefaultWorkingDirectory)/playwright-report'
          artifact: 'playwright-report'
          publishLocation: 'pipeline'